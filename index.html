<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Photo Spot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      #ui-layer {
        position: fixed; top: 40px; left: 0; width: 100%; z-index: 100;
        display: flex; justify-content: center; pointer-events: none;
      }
      .title {
        font-family: sans-serif; font-size: 18px; font-weight: bold; color: #333;
        background: rgba(255, 255, 255, 0.9); padding: 8px 20px; border-radius: 50px;
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화마ウル</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-camera look-controls-enabled="false" wasd-controls-enabled="false">
        <a-image 
          src="#busan-img" 
          position="0 0 -10" 
          width="9" 
          height="12"
          material="shader: flat; transparent: false; opacity: 1.0;">
        </a-image>
      </a-camera>

    </a-scene>
  </body>
</html>
