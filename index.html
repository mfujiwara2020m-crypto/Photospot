<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Golden Ratio</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 【1層目：カメラ映像】窓の奥に見える人 */
      #video-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* 【2層目：釜山の背景】窓を小さくして、景色を広く見せる */
      #busan-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 2;
        background-image: url('day_2.jpg');
        background-size: cover;
        background-position: center;
        
        /* 窓のサイズを調整：中央の40%〜60%だけを抜く */
        -webkit-mask-image: radial-gradient(transparent 45%, black 48%);
        /* 四角い窓を小さく作る設定 */
        mask: linear-gradient(to right, black 25%, transparent 25%, transparent 75%, black 75%),
              linear-gradient(to bottom, black 30%, transparent 30%, transparent 70%, black 70%);
        mask-composite: exclude;
        -webkit-mask-composite: destination-in;
      }

      /* 【3層目：窓の枠】小さくなった窓に合わせる */
      #frame-line {
        position: fixed;
        top: 30vh; left: 25vw; /* 上下左右に余白をたっぷり作る */
        width: 50vw; height: 40vh; /* 窓をコンパクトに */
        border: 3px solid white;
        border-radius: 15px;
        z-index: 3;
        pointer-events: none;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
      }

      .label {
        position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
        background: white; color: #333; padding: 4px 12px; border-radius: 5px;
        font-weight: bold; font-family: sans-serif; font-size: 12px; white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <video id="video-bg" autoplay playsinline></video>
    <div id="busan-overlay"></div>
    <div id="frame-line">
      <div class="label">감천 문화마을</div>
    </div>

    <script>
      const video = document.getElementById('video-bg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("カメラを許可してください"); });
    </script>
  </body>
</html>
