<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Busan AR Photo Spot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* UIのスタイリング */
      .ar-ui {
        position: fixed;
        z-index: 10;
        width: 100%;
        text-align: center;
        pointer-events: none;
      }
      .title {
        top: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #333;
        background: rgba(255, 255, 255, 0.8);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 20px;
        margin-top: 20px;
      }
      .click-button {
        bottom: 50px;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        border: 2px solid #333;
        padding: 10px 30px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        pointer-events: auto;
      }
      /* 吹き出しの三角部分 */
      .click-button::after {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        margin-left: -10px;
        border-width: 0 10px 10px 10px;
        border-style: solid;
        border-color: transparent transparent #333 transparent;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div class="ar-ui">
      <div class="title">감천 문화마을</div>
    </div>

    <button class="click-button" onclick="takePhoto()">Click</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-image 
        src="#busan-img" 
        position="0 1.5 -3" 
        width="2" 
        height="3"
        rotation="0 0 0">
      </a-image>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function takePhoto() {
        alert("写真を撮影しました！（ここへ保存処理などを追加可能）");
        // 実際の実装ではここでcanvasの内容を画像として書き出す処理を加えます
      }
    </script>
  </body>
</html>
