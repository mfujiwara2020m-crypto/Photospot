<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Photo Spot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        font-family: sans-serif;
      }
      .title {
        margin-top: 40px;
        font-size: 22px;
        font-weight: bold;
        color: #333;
        background: rgba(255, 255, 255, 0.9);
        padding: 8px 25px;
        border-radius: 40px;
        pointer-events: auto;
      }
      .click-button {
        margin-bottom: 60px;
        background: white;
        border: 4px solid #000;
        padding: 12px 35px;
        border-radius: 60px;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        pointer-events: auto;
        position: relative;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
      .click-button::after {
        content: "";
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 0 12px 15px 12px;
        border-style: solid;
        border-color: transparent transparent #000 transparent;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
      <button class="click-button" onclick="takeSnapshot()">Click</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false"
      screenshot>
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-image 
        src="#busan-img" 
        position="0 1.5 -3.0" 
        width="1.5" 
        height="2.1">
      </a-image>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function takeSnapshot() {
        const scene = document.querySelector('a-scene');
        const components = scene.components.screenshot;
        if (components) {
          const canvas = components.getCanvas('perspective');
          const dataURL = canvas.toDataURL("image/png");
          const link = document.createElement('a');
          link.download = 'busan-photo.png';
          link.href = dataURL;
          link.click();
        } else {
          alert("Preparing...");
        }
      }
    </script>
  </body>
</html>
