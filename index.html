<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BUSAN NEON PORTAL</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Hiragino Kaku Gothic ProN', 'sans-serif'; }

      /* 【1層目】カメラ映像 */
      #video-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }

      /* 【2層目】背景画像パネル */
      .bg-panel { position: fixed; z-index: 2; background-image: url('day_2.jpg'); background-size: 100vw 100vh; background-repeat: no-repeat; }
      #panel-top { top: 0; left: 0; width: 100vw; height: 60vh; background-position: top center; }
      #panel-bottom { bottom: 0; left: 0; width: 100vw; height: 5vh; background-position: bottom center; }
      #panel-left { top: 60vh; left: 0; width: 25vw; height: 35vh; background-position: left center; }
      #panel-right { top: 60vh; right: 0; width: 25vw; height: 35vh; background-position: right center; }

      /* 【3層目】ネオンゲート（よりスタイリッシュに） */
      #neon-frame {
        position: fixed; top: 60vh; left: 25vw; width: 50vw; height: 35vh;
        box-sizing: border-box; border: 3px solid #00f2ff; border-radius: 15px; z-index: 3;
        box-shadow: 0 0 15px #00f2ff, inset 0 0 10px #00f2ff, 0 0 30px #ff00de;
        border-image: linear-gradient(to bottom right, #00f2ff, #ff00de) 1;
        pointer-events: none;
      }

      /* 【4層目】韓国語ハッシュタグ */
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 10; pointer-events: none;
        display: flex; flex-direction: column; align-items: center;
      }
      .busan-tag {
        position: absolute; top: 56.5vh; color: #fff; font-size: 14px;
        font-weight: bold; text-shadow: 0 0 8px #ff00de;
        letter-spacing: 1px;
      }
    </style>
  </head>

  <body>
    <video id="video-bg" autoplay playsinline></video>

    <div class="bg-panel" id="panel-top"></div>
    <div class="bg-panel" id="panel-bottom"></div>
    <div class="bg-panel" id="panel-left"></div>
    <div class="bg-panel" id="panel-right"></div>

    <div id="neon-frame"></div>

    <div id="ui-layer">
      <div class="busan-tag">#감천문화마을</div>
    </div>

    <script>
      const video = document.getElementById('video-bg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { console.error(err); });
    </script>
  </body>
</html>
