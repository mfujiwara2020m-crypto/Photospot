<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Photo Spot</title>
    <style>
      /* 全ての背景を透明にし、カメラが見えるようにする */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* カメラ映像を全画面に表示（最背面） */
      #camera-view {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* 釜山の画像をカメラの上に重ねる */
      #busan-frame {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%); /* 画面中央に配置 */
        width: 100%; /* 画面幅いっぱいに */
        height: auto;
        z-index: 10; /* カメラより前 */
        pointer-events: none; /* 画像を触ってもカメラ操作を邪魔しない */
        opacity: 0.6; /* ★ここを0.5〜0.8にすると、人と背景が混ざり合います */
      }

      .title {
        position: fixed; top: 40px; width: 100%; text-align: center;
        z-index: 100;
        font-family: sans-serif; font-size: 18px; font-weight: bold;
      }
      .title span {
        background: rgba(255, 255, 255, 0.9); padding: 8px 25px; border-radius: 50px;
      }
    </style>
  </head>

  <body>
    <div class="title"><span>감천 문화마을</span></div>

    <video id="camera-view" autoplay playsinline></video>

    <img src="day_2.jpg" id="busan-frame">

    <script>
      // 非常にシンプルなカメラ起動スクリプト
      const video = document.getElementById('camera-view');
      
      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' }, 
            audio: false 
          });
          video.srcObject = stream;
        } catch (err) {
          console.error("Camera error:", err);
          alert("カメラを許可してください。");
        }
      }

      startCamera();
    </script>
  </body>
</html>
