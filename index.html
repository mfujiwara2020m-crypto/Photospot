<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Final Adjust</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 【1層目】カメラ映像 */
      #video-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* 【2層目】4枚の画像パネル */
      .bg-panel {
        position: fixed;
        z-index: 2;
        background-image: url('day_2.jpg');
        background-size: 100vw 100vh;
        background-repeat: no-repeat;
      }
      
      /* 上のパネルを長くして、窓を下に押し下げます（25vh → 40vh） */
      #panel-top { top: 0; left: 0; width: 100vw; height: 40vh; background-position: top center; }
      
      /* 下のパネルを短くします（35vh → 20vh） */
      #panel-bottom { bottom: 0; left: 0; width: 100vw; height: 20vh; background-position: bottom center; }
      
      /* 左右のパネルの開始位置も下げます（top: 25vh → 40vh） */
      #panel-left { top: 40vh; left: 0; width: 20vw; height: 40vh; background-position: left center; }
      #panel-right { top: 40vh; right: 0; width: 20vw; height: 40vh; background-position: right center; }

      /* 【3層目】白い枠の位置も合わせます（top: 25vh → 40vh） */
      #frame-line {
        position: fixed;
        top: 40vh; left: 20vw;
        width: 60vw; height: 40vh;
        border: 3px solid white;
        box-sizing: border-box;
        border-radius: 10px;
        z-index: 3;
        pointer-events: none;
      }

      .label {
        position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
        background: white; color: #333; padding: 4px 15px; border-radius: 5px;
        font-weight: bold; font-family: sans-serif; font-size: 14px; white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <video id="video-bg" autoplay playsinline></video>

    <div class="bg-panel" id="panel-top"></div>
    <div class="bg-panel" id="panel-bottom"></div>
    <div class="bg-panel" id="panel-left"></div>
    <div class="bg-panel" id="panel-right"></div>

    <div id="frame-line">
      <div class="label">감천 文化마을</div>
    </div>

    <script>
      const video = document.getElementById('video-bg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("カメラを許可してください"); });
    </script>
  </body>
</html>
