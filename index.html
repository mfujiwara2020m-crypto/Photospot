<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Perfect Frame</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 【1層目】カメラ映像（一番奥） */
      #video-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* 【2層目】背景（4枚のパネルで中央を囲む） */
      /* これにより、十字にカメラが漏れるのを物理的に防ぎます */
      .bg-panel {
        position: fixed;
        z-index: 2;
        background-image: url('day_2.jpg');
        background-size: 100vw 100vh; /* 画像サイズを画面に固定 */
        background-repeat: no-repeat;
      }
      
      /* 上の壁 */
      #panel-top { top: 0; left: 0; width: 100vw; height: 25vh; background-position: top center; }
      /* 下の壁 */
      #panel-bottom { bottom: 0; left: 0; width: 100vw; height: 35vh; background-position: bottom center; }
      /* 左の壁 */
      #panel-left { top: 25vh; left: 0; width: 20vw; height: 40vh; background-position: left center; }
      /* 右の壁 */
      #panel-right { top: 25vh; right: 0; width: 20vw; height: 40vh; background-position: right center; }

      /* 【3層目】中央の白い枠 */
      #frame-line {
        position: fixed;
        top: 25vh; left: 20vw;
        width: 60vw; height: 40vh;
        border: 3px solid white;
        box-sizing: border-box;
        border-radius: 10px;
        z-index: 3;
        pointer-events: none;
      }

      .label {
        position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
        background: white; color: #333; padding: 4px 15px; border-radius: 5px;
        font-weight: bold; font-family: sans-serif; font-size: 14px; white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <video id="video-bg" autoplay playsinline></video>

    <div class="bg-panel" id="panel-top"></div>
    <div class="bg-panel" id="panel-bottom"></div>
    <div class="bg-panel" id="panel-left"></div>
    <div class="bg-panel" id="panel-right"></div>

    <div id="frame-line">
      <div class="label">감천 문화마을</div>
    </div>

    <script>
      const video = document.getElementById('video-bg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("カメラを許可してください"); });
    </script>
  </body>
</html>
