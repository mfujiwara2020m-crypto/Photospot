<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Portal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-layer {
        position: fixed;
        top: 30px;
        left: 0;
        width: 100%;
        z-index: 999;
        pointer-events: none;
        display: flex;
        justify-content: center;
      }
      .title {
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
        color: #333;
        background: rgba(255, 255, 255, 0.8);
        padding: 10px 25px;
        border-radius: 50px;
        backdrop-filter: blur(5px); /* 背景を少しぼかして高級感を出す */
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true;">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-entity id="world">
        <a-image 
          src="#busan-img" 
          position="0 1.5 -3" 
          width="2.2" 
          height="3.0"
          material="transparent: true; opacity: 0.9; side: double; shader: flat;"
          animation="property: position; to: 0 1.55 -3; dir: alternate; dur: 2000; loop: true">
          </a-image>
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
