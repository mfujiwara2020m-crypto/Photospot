<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Portal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* 背景を完全に透過させる */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
      
      /* ARシーンを最前面に持ってくる */
      a-scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      /* タイトルレイヤー */
      #ui-layer {
        position: fixed; top: 40px; left: 0; width: 100%; z-index: 100;
        display: flex; justify-content: center; pointer-events: none;
      }
      .title {
        font-family: sans-serif; font-size: 20px; font-weight: bold;
        background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 50px;
      }

      /* もしAR.jsがカメラ映像を別の場所に作っても、強制的に背面に送る */
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
        z-index: -1; /* 一番奥へ */
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false;" 
      vr-mode-ui="enabled: false"
      renderer="alpha: true; clearColor: 0x000000; antialias: true;">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-camera look-controls-enabled="false" wasd-controls-enabled="false">
        <a-image 
          src="#busan-img" 
          position="0 0 -5" 
          width="5" 
          height="7"
          material="shader: flat; transparent: true; opacity: 1.0;">
        </a-image>
      </a-camera>

    </a-scene>
  </body>
</html>
