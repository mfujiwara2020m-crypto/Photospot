<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Photo Spot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

      /* 背景のカメラ映像を全画面に表示 */
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* 上部のタイトルロゴ */
      .title {
        position: absolute;
        top: 40px;
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
        color: #333;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 25px;
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }

      /* 【重要】ARフレーム画像を画面中央に固定 */
      .ar-frame {
        width: 80%;      /* 画面幅の80%にサイズ調整 */
        max-width: 400px;
        height: auto;
        opacity: 0.95;   /* 友人と馴染むように少しだけ透かす */
        border: none;
      }

      /* AR.jsのカメラ映像が映るキャンバスを一番奥にする */
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
      <img src="day_2.jpg" class="ar-frame">
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
