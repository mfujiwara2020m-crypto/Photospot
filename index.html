<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Seamless Portal</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 【1層目】カメラ映像 */
      #video-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      /* 【2層目】画像パネル（4枚で窓を作る） */
      .bg-panel {
        position: fixed;
        z-index: 2;
        background-image: url('day_2.jpg');
        background-size: 100vw 100vh;
        background-repeat: no-repeat;
      }
      
      /* 上下左右のパネル設定（前回のコンパクトサイズを継承） */
      #panel-top { top: 0; left: 0; width: 100vw; height: 60vh; background-position: top center; }
      #panel-bottom { bottom: 0; left: 0; width: 100vw; height: 5vh; background-position: bottom center; }
      #panel-left { top: 60vh; left: 0; width: 25vw; height: 35vh; background-position: left center; }
      #panel-right { top: 60vh; right: 0; width: 25vw; height: 35vh; background-position: right center; }

      /* 【3層目】透明な枠（線は見えないが、ラベルだけ残す） */
      #frame-line {
        position: fixed;
        top: 60vh; left: 25vw;
        width: 50vw; height: 35vh;
        /* border: 2.5px solid white;  ←ここを消しました！ */
        box-sizing: border-box;
        z-index: 3;
        pointer-events: none;
        /* 境界線にうっすら影をつけて、奥行きを出します */
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
      }

      .label {
        position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.8); color: #333; padding: 3px 12px; border-radius: 4px;
        font-weight: bold; font-family: sans-serif; font-size: 11px; white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <video id="video-bg" autoplay playsinline></video>

    <div class="bg-panel" id="panel-top"></div>
    <div class="bg-panel" id="panel-bottom"></div>
    <div class="bg-panel" id="panel-left"></div>
    <div class="bg-panel" id="panel-right"></div>

    <div id="frame-line">
      <div class="label">감천 문화마을</div>
    </div>

    <script>
      const video = document.getElementById('camera-fg'); /* ID修正 */
      const videoElem = document.getElementById('video-bg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { videoElem.srcObject = stream; })
        .catch(err => { alert("カメラを許可してください"); });
    </script>
  </body>
</html>
