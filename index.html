<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Portal Shot</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

      /* 1. 【背景】プサンの画像を一番奥に「くっきり」表示 */
      #busan-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover; /* 画面いっぱいに広げる */
        z-index: 1;
        filter: brightness(0.9); /* 少しだけ暗くすると人物が引き立ちます */
      }

      /* 2. 【手前】カメラ映像（友人）を上に重ねる */
      #camera-fg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        object-fit: cover;
        z-index: 2;
        /* ★ここが重要！人を浮かび上がらせ、背景と馴染ませる設定 */
        mix-blend-mode: screen; 
        opacity: 0.9; /* 人をハッキリさせるために高めに設定 */
      }

      /* 3. 【額縁】画像のような「白い枠」をつけて、窓っぽさを出す */
      #frame-overlay {
        position: fixed;
        top: 10vh; left: 10vw;
        width: 80vw; height: 80vh;
        border: 5px solid white;
        border-radius: 20px;
        box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
        z-index: 10;
        pointer-events: none;
      }

      .title-label {
        position: absolute; top: -20px; left: 50%;
        transform: translateX(-50%);
        background: white; color: #333;
        padding: 5px 20px; border-radius: 10px;
        font-weight: bold; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <img src="day_2.jpg" id="busan-bg">

    <video id="camera-fg" autoplay playsinline></video>

    <div id="frame-overlay">
      <div class="title-label">감천 문화마을</div>
    </div>

    <script>
      const video = document.getElementById('camera-fg');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("カメラを許可してください"); });
    </script>
  </body>
</html>
