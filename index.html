<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Background</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* 全体を透明にし、カメラ映像を最背面に強制 */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
      
      #ui-layer {
        position: fixed; top: 40px; left: 0; width: 100%; z-index: 100;
        display: flex; justify-content: center; pointer-events: none;
      }
      .title {
        font-family: sans-serif; font-size: 20px; font-weight: bold;
        background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }
      
      /* AR.jsのキャンバス（カメラ映像）を確実に表示させる */
      canvas { position: absolute; top: 0; left: 0; z-index: 0; }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화マウル</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false"
      renderer="alpha: true; antialias: true;">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-camera look-controls-enabled="false" wasd-controls-enabled="false">
        <a-image 
          src="#busan-img" 
          position="0 0 -5" 
          width="5" 
          height="7"
          material="shader: flat; transparent: true; opacity: 1.0;">
        </a-image>
      </a-camera>

    </a-scene>
  </body>
</html>
