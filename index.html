<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan AR Background</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui-layer {
        position: fixed; top: 30px; left: 0; width: 100%; z-index: 999;
        display: flex; justify-content: center; pointer-events: none;
      }
      .title {
        font-family: sans-serif; font-size: 20px; font-weight: bold;
        background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 50px;
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-entity camera>
        <a-image 
          src="#busan-img" 
          position="0 0.5 -5" 
          width="6" 
          height="8"
          material="shader: flat; transparent: false; opacity: 1.0;">
        </a-image>
      </a-entity>

    </a-scene>
  </body>
</html>
