<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Busan Perfect Shot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #ui-layer {
        position: fixed; top: 30px; left: 0; width: 100%; z-index: 1000;
        display: flex; justify-content: center; pointer-events: none;
      }
      .title {
        font-family: sans-serif; font-size: 18px; font-weight: bold;
        background: rgba(255, 255, 255, 0.9); padding: 8px 25px; border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
    </style>
  </head>

  <body>
    <div id="ui-layer">
      <div class="title">감천 문화마을</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="busan-img" src="day_2.jpg">
      </a-assets>

      <a-camera look-controls="enabled: false" wasd-controls="enabled: false">
        <a-image 
          src="#busan-img" 
          position="0 0 -20" 
          width="15" 
          height="20"
          material="shader: flat; opacity: 1.0;"> </a-image>
      </a-camera>

    </a-scene>
  </body>
</html>
